[pytest]
# Pytest configuration for PhishScope

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=agents
    --cov=utils
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --asyncio-mode=auto

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full pipeline
    slow: Tests that take significant time to run
    requires_browser: Tests that require Playwright browser
    requires_ai: Tests that require LLM configuration

# Asyncio configuration
asyncio_mode = auto

# Coverage options
[coverage:run]
source = agents,utils
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov