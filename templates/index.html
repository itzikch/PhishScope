<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishScope Web - Real-Time Phishing Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .analysis-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .url-input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: monospace;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .analyze-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
        }
        
        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .warning i {
            color: #ffc107;
            font-size: 1.5rem;
        }
        
        .status-section {
            display: none;
            margin-top: 20px;
        }
        
        .status-section.active {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        
        .status-text {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        
        .results-section {
            display: none;
        }
        
        .results-section.active {
            display: block;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 15px 25px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .finding-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .finding-card h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .finding-card p {
            color: #666;
            line-height: 1.6;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .badge-high { background: #fee; color: #c00; }
        .badge-medium { background: #fff3cd; color: #856404; }
        .badge-low { background: #d4edda; color: #155724; }
        
        .screenshot-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .screenshot-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microscope"></i> PhishScope Web</h1>
            <p>Real-Time Phishing Analysis with Agent-Based Architecture</p>
        </div>
        
        <div class="analysis-card">
            <div class="warning">
                <i class="fas fa-exclamation-triangle"></i>
                <div>
                    <strong>Security Warning:</strong> This tool will load potentially malicious URLs. 
                    Only use in an isolated environment with proper network controls.
                </div>
            </div>
            
            <div class="input-section">
                <input type="url" 
                       id="urlInput" 
                       class="url-input" 
                       placeholder="https://suspicious-site.example.com"
                       value="https://example.com/">
                <button id="analyzeBtn" class="analyze-btn">
                    <i class="fas fa-search"></i> Analyze URL
                </button>
            </div>
            
            <div id="statusSection" class="status-section">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="statusText" class="status-text">
                    <i class="fas fa-spinner fa-spin"></i> Initializing analysis...
                </div>
            </div>
        </div>
        
        <div id="resultsSection" class="results-section">
            <div class="analysis-card">
                <div class="tabs">
                    <button class="tab active" data-tab="summary">
                        <i class="fas fa-chart-bar"></i> Summary
                    </button>
                    <button class="tab" data-tab="dom">
                        <i class="fas fa-code"></i> DOM Analysis
                    </button>
                    <button class="tab" data-tab="javascript">
                        <i class="fas fa-file-code"></i> JavaScript
                    </button>
                    <button class="tab" data-tab="network">
                        <i class="fas fa-network-wired"></i> Network
                    </button>
                    <button class="tab" data-tab="ai">
                        <i class="fas fa-robot"></i> AI Analysis
                    </button>
                    <button class="tab" data-tab="screenshot">
                        <i class="fas fa-image"></i> Screenshot
                    </button>
                </div>
                
                <div id="summary" class="tab-content active">
                    <!-- Summary content will be inserted here -->
                </div>
                
                <div id="dom" class="tab-content">
                    <!-- DOM content will be inserted here -->
                </div>
                
                <div id="javascript" class="tab-content">
                    <!-- JavaScript content will be inserted here -->
                </div>
                
                <div id="network" class="tab-content">
                    <!-- Network content will be inserted here -->
                </div>
                
                <div id="ai" class="tab-content">
                    <!-- AI Analysis will be inserted here -->
                </div>
                
                <div id="screenshot" class="tab-content">
                    <!-- Screenshot will be inserted here -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const urlInput = document.getElementById('urlInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusSection = document.getElementById('statusSection');
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');
        const resultsSection = document.getElementById('resultsSection');
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const targetTab = this.getAttribute('data-tab');
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(targetTab).classList.add('active');
            });
        });
        
        // Analyze button click
        analyzeBtn.addEventListener('click', async function() {
            const url = urlInput.value.trim();
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('Please enter a valid URL starting with http:// or https://');
                return;
            }
            
            // Show status section
            statusSection.classList.add('active');
            resultsSection.classList.remove('active');
            analyzeBtn.disabled = true;
            
            // Simulate progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += 2;
                if (progress <= 90) {
                    progressFill.style.width = progress + '%';
                }
            }, 200);
            
            const steps = [
                'Loading page...',
                'Inspecting DOM...',
                'Analyzing JavaScript...',
                'Analyzing network traffic...',
                'Generating report...'
            ];
            
            let stepIndex = 0;
            const stepInterval = setInterval(() => {
                if (stepIndex < steps.length) {
                    statusText.innerHTML = `<i class="fas fa-spinner fa-spin"></i> [${stepIndex + 1}/5] ${steps[stepIndex]}`;
                    stepIndex++;
                }
            }, 2000);
            
            try {
                // Call API
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                clearInterval(progressInterval);
                clearInterval(stepInterval);
                progressFill.style.width = '100%';
                
                if (data.error) {
                    statusText.innerHTML = `<i class="fas fa-times-circle" style="color: red;"></i> Error: ${data.error}`;
                    analyzeBtn.disabled = false;
                    return;
                }
                
                // Display results
                displayResults(data.results, data.analysis_id);
                
                statusSection.classList.remove('active');
                resultsSection.classList.add('active');
                analyzeBtn.disabled = false;
                
            } catch (error) {
                clearInterval(progressInterval);
                clearInterval(stepInterval);
                statusText.innerHTML = `<i class="fas fa-times-circle" style="color: red;"></i> Error: ${error.message}`;
                analyzeBtn.disabled = false;
            }
        });
        
        function displayResults(results, analysisId) {
            const findings = results.findings || {};
            const dom = findings.dom || {};
            const js = findings.javascript || {};
            const network = findings.network || {};
            const ai = findings.ai_analysis || {};
            
            // Summary
            const summaryHtml = `
                <div class="summary-grid">
                    <div class="stat-card">
                        <div class="stat-value">${dom.forms_count || 0}</div>
                        <div class="stat-label">Forms Detected</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(js.suspicious_patterns || []).length}</div>
                        <div class="stat-label">JS Patterns</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(network.exfiltration_candidates || []).length}</div>
                        <div class="stat-label">Exfil Endpoints</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${network.total_requests || 0}</div>
                        <div class="stat-label">Network Requests</div>
                    </div>
                </div>
                <div class="finding-card">
                    <h3><i class="fas fa-info-circle"></i> Analysis Complete</h3>
                    <p><strong>URL:</strong> ${results.url}</p>
                    <p><strong>Timestamp:</strong> ${results.timestamp}</p>
                    <p><strong>Status:</strong> <span class="badge badge-low">${results.status}</span></p>
                </div>
            `;
            document.getElementById('summary').innerHTML = summaryHtml;
            
            // DOM Analysis
            const domHtml = `
                <div class="finding-card">
                    <h3><i class="fas fa-code"></i> DOM Structure</h3>
                    <p><strong>Forms:</strong> ${dom.forms_count || 0}</p>
                    <p><strong>Password Fields:</strong> ${(dom.password_fields || []).length}</p>
                    <p><strong>Hidden Inputs:</strong> ${(dom.hidden_inputs || []).length}</p>
                </div>
                ${(dom.evidence || []).map(e => `<div class="finding-card"><p>${e}</p></div>`).join('')}
            `;
            document.getElementById('dom').innerHTML = domHtml;
            
            // JavaScript Analysis
            const jsHtml = `
                <div class="finding-card">
                    <h3><i class="fas fa-file-code"></i> JavaScript Behavior</h3>
                    <p><strong>Inline Scripts:</strong> ${js.inline_scripts_count || 0}</p>
                    <p><strong>External Scripts:</strong> ${js.external_scripts_count || 0}</p>
                    <p><strong>Suspicious Patterns:</strong> ${(js.suspicious_patterns || []).length}</p>
                </div>
                ${(js.evidence || []).map(e => `<div class="finding-card"><p>${e}</p></div>`).join('')}
            `;
            document.getElementById('javascript').innerHTML = jsHtml;
            
            // Network Analysis
            const networkHtml = `
                <div class="finding-card">
                    <h3><i class="fas fa-network-wired"></i> Network Traffic</h3>
                    <p><strong>Total Requests:</strong> ${network.total_requests || 0}</p>
                    <p><strong>POST Requests:</strong> ${(network.post_requests || []).length}</p>
                    <p><strong>Exfiltration Candidates:</strong> ${(network.exfiltration_candidates || []).length}</p>
                </div>
                ${(network.evidence || []).map(e => `<div class="finding-card"><p>${e}</p></div>`).join('')}
            `;
            document.getElementById('network').innerHTML = networkHtml;
            
            // Screenshot
            const screenshotHtml = `
                <div class="screenshot-container">
                    <h3>Page Screenshot</h3>
                    <img src="/api/screenshot/${analysisId}" alt="Page Screenshot" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22600%22><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22>Screenshot not available</text></svg>'">
                </div>
            `;
            document.getElementById('screenshot').innerHTML = screenshotHtml;
            
            // AI Analysis
            if (ai && ai.ai_enabled) {
                const assessment = ai.phishing_assessment || {};
                const verdict = assessment.verdict || 'Unknown';
                const confidence = assessment.confidence || 0;
                const indicators = assessment.key_indicators || [];
                const reasoning = assessment.reasoning || 'No reasoning provided';
                const recommendations = ai.recommendations || [];
                
                const verdictClass = verdict.includes('High') ? 'badge-high' :
                                   verdict.includes('Medium') ? 'badge-medium' : 'badge-low';
                
                const aiHtml = `
                    <div class="finding-card" style="border-left-color: #667eea;">
                        <h3><i class="fas fa-robot"></i> AI-Powered Assessment</h3>
                        <p><strong>Provider:</strong> ${ai.provider || 'Unknown'}</p>
                        <p><strong>Model:</strong> ${ai.model || 'Unknown'}</p>
                    </div>
                    <div class="finding-card" style="border-left-color: ${verdict.includes('High') ? '#dc3545' : verdict.includes('Medium') ? '#ffc107' : '#28a745'};">
                        <h3><i class="fas fa-shield-alt"></i> Phishing Verdict</h3>
                        <p><strong>Risk Level:</strong> <span class="badge ${verdictClass}">${verdict}</span></p>
                        <p><strong>Confidence:</strong> ${confidence}%</p>
                    </div>
                    ${indicators.length > 0 ? `
                    <div class="finding-card">
                        <h3><i class="fas fa-list-ul"></i> Key Indicators</h3>
                        <ul>
                            ${indicators.map(ind => `<li>${ind}</li>`).join('')}
                        </ul>
                    </div>
                    ` : ''}
                    ${reasoning ? `
                    <div class="finding-card">
                        <h3><i class="fas fa-brain"></i> AI Reasoning</h3>
                        <p>${reasoning}</p>
                    </div>
                    ` : ''}
                    ${recommendations.length > 0 ? `
                    <div class="finding-card">
                        <h3><i class="fas fa-lightbulb"></i> Security Recommendations</h3>
                        <ul>
                            ${recommendations.map(rec => `<li>${rec}</li>`).join('')}
                        </ul>
                    </div>
                    ` : ''}
                `;
                document.getElementById('ai').innerHTML = aiHtml;
            } else {
                document.getElementById('ai').innerHTML = `
                    <div class="finding-card">
                        <h3><i class="fas fa-info-circle"></i> AI Analysis Not Available</h3>
                        <p>AI-enhanced analysis is not configured. To enable:</p>
                        <ol>
                            <li>Configure LLM provider in .env file</li>
                            <li>Set LLM_PROVIDER to 'watsonx' or 'rits'</li>
                            <li>Add your API credentials</li>
                        </ol>
                        <p>See <a href="https://github.com/yourusername/PhishScope/blob/main/LLM_PROVIDERS.md" target="_blank">LLM_PROVIDERS.md</a> for details.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
